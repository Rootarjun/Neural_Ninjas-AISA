{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Submitted – IntelliProctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0d6efd;
            --primary-glow: rgba(13,110,253,0.25);
            --dark: #0b0f1a;
            --dark-card: #111827;
            --surface: #161d2e;
            --border: rgba(255,255,255,0.07);
            --text-light: #e2e8f0;
            --text-muted: #8892a4;
            --accent: #38bdf8;
            --green: #4ade80;
            --green-glow: rgba(74,222,128,0.25);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark); color: var(--text-light);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
        }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.3; }
        .success-card {
            position: relative; z-index: 1;
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 3.5rem 2.75rem;
            max-width: 480px; width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px rgba(74,222,128,0.07);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }
        /* CHECK RING */
        .check-ring {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: rgba(74,222,128,0.1);
            border: 2px solid rgba(74,222,128,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.75rem;
            font-size: 2.5rem; color: var(--green);
            box-shadow: 0 0 40px rgba(74,222,128,0.2);
            animation: ringPulse 2.5s ease-in-out infinite;
        }
        @keyframes ringPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(74,222,128,0.15); }
            50%       { box-shadow: 0 0 60px rgba(74,222,128,0.35); }
        }
        h2 {
            font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.7rem;
            color: var(--green); margin-bottom: 0.75rem;
        }
        p {
            color: var(--text-muted); font-size: 0.95rem; line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn-home {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: linear-gradient(135deg, #198754, #4ade80); border: none;
            border-radius: 12px; font-family: 'Sora', sans-serif; font-weight: 700;
            font-size: 0.95rem; padding: 0.8rem 2.5rem; color: #fff;
            box-shadow: 0 0 30px rgba(74,222,128,0.25); transition: all 0.3s; text-decoration: none;
            cursor: pointer;
        }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(74,222,128,0.35); color: #fff; filter: brightness(1.1); }
        /* CONFETTI dots */
        .confetti-dot {
            position: fixed; width: 8px; height: 8px; border-radius: 2px;
            opacity: 0; animation: confettiFall 3s ease forwards;
            z-index: 0;
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }
        .divider { width: 50px; height: 3px; background: rgba(74,222,128,0.3); border-radius: 2px; margin: 0 auto 1.5rem; }
        .meta-tag {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.35rem 0.85rem;
            font-size: 0.78rem; color: var(--text-muted);
            font-family: 'Sora', sans-serif; font-weight: 600;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<div class="success-card">
    <div class="check-ring">
        <i class="fas fa-check"></i>
    </div>

    <div class="meta-tag">
        <i class="fas fa-eye" style="color:var(--accent)"></i>
        IntelliProctor · Exam Session
    </div>

    <h2>Exam Completed!</h2>
    <div class="divider"></div>
    <p>Your exam has been successfully submitted and your result has been securely recorded. The AI proctoring session has ended.</p>

    <button class="btn-home" onclick="window.location.href='/'">
        <i class="fas fa-house"></i> Return to Home
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Confetti
    const colors = ['#4ade80','#38bdf8','#818cf8','#fde047','#f9a8d4'];
    for (let i = 0; i < 60; i++) {
        const dot = document.createElement('div');
        dot.className = 'confetti-dot';
        dot.style.left = Math.random() * 100 + 'vw';
        dot.style.top = '-10px';
        dot.style.background = colors[Math.floor(Math.random() * colors.length)];
        dot.style.animationDelay = Math.random() * 2 + 's';
        dot.style.animationDuration = (2 + Math.random() * 2) + 's';
        document.body.appendChild(dot);
    }
    // Particles
    (function(){
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles = [];
        function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        class Particle {
            constructor(){ this.x=Math.random()*W; this.y=Math.random()*H; this.r=Math.random()*1.8+0.4; this.dx=(Math.random()-0.5)*0.3; this.dy=(Math.random()-0.5)*0.3; this.alpha=Math.random()*0.4+0.1; }
            update(){ this.x+=this.dx; this.y+=this.dy; if(this.x<0||this.x>W)this.dx*=-1; if(this.y<0||this.y>H)this.dy*=-1; }
            draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(56,189,248,${this.alpha})`; ctx.fill(); }
        }
        for(let i=0;i<50;i++) particles.push(new Particle());
        function loop(){ ctx.clearRect(0,0,W,H); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); }
        loop();
    })();
</script>
</body>
</html>
